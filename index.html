<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Underroot — Test Build</title>
  <link rel="icon" type="image/png" href="/assets/images/underroot_favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex; align-items: center; justify-content: center;
    }

    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: min(340px, 88vw);
    }

    #title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(0.65rem, 2.5vw, 0.85rem);
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.08em;
      text-align: center;
    }
    #title span { color: #8c2828; }

    #pw-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    #pw-input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 2px;
      padding: 11px 18px;
      color: rgba(255,255,255,0.85);
      font-family: 'Georgia', serif;
      font-size: 14px;
      letter-spacing: 0.04em;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    #pw-input::placeholder { color: rgba(255,255,255,0.25); }
    #pw-input:focus { border-color: rgba(255,255,255,0.4); }

    #pw-submit {
      width: 100%;
      background: rgba(140,40,40,0.7);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 2px;
      padding: 11px 20px;
      color: rgba(255,255,255,0.85);
      font-family: 'Georgia', serif;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #pw-submit:hover { background: rgba(140,40,40,0.95); color: #fff; }

    #pw-msg {
      font-family: 'Georgia', serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      min-height: 16px;
      text-align: center;
    }
    #pw-msg.error { color: #8c2828; }
  </style>
</head>
<body>
  <div id="gate">
    <div id="title">Underroot — <span>Test Build</span></div>
    <form id="pw-form">
      <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="pw-submit" type="submit">Enter</button>
      <span id="pw-msg"></span>
    </form>
  </div>

  <script>
    const CORRECT = 'axeldavemiketestunderroot';
    const SESSION_KEY = 'ur_test_auth';

    // Already authenticated this session — go straight to game
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      location.replace('/game/');
    }

    document.getElementById('pw-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const val = document.getElementById('pw-input').value;
      const msg = document.getElementById('pw-msg');
      if (val === CORRECT) {
        sessionStorage.setItem(SESSION_KEY, '1');
        location.replace('/game/');
      } else {
        msg.textContent = 'Incorrect password.';
        msg.classList.add('error');
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    });
  </script>
</body>
</html>
